*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* HEADER */
.hdr{
  background:rgba(8,12,20,.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:200;
}

.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-emblem{

  background:linear-gradient(135deg,#2563eb,#3b7fff);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(59,127,255,.4);
}
.hdr-emblem svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2}
.hdr-brand{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.hdr-sub{font-size:10px;color:var(--text3);margin-top:1px;letter-spacing:.02em}
.hdr-divider{width:1px;height:28px;background:var(--border);margin:0 8px}
.hdr-title{font-size:13px;font-weight:500;color:var(--text2);flex:1;text-align:center}
.hdr-actions{display:flex;align-items:center;gap:8px}
